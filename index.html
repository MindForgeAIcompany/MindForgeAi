<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindForge AI</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a0a;font-family:system-ui,sans-serif;color:#fff;height:100vh}
        .container{display:flex;flex-direction:column;height:100vh;max-width:800px;margin:0 auto}
        .header{padding:20px;text-align:center;border-bottom:1px solid #222}
        .logo{font-size:24px;font-weight:700;background:linear-gradient(135deg,#fff,#a855f7);background-clip:text;-webkit-background-clip:text;color:transparent}
        .messages{flex:1;overflow-y:auto;padding:20px}
        .message{display:flex;gap:10px;margin-bottom:12px}
        .avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .user .avatar{background:#7c3eff}
        .ai .avatar{background:#2a2a2a;border:1px solid #7c3eff}
        .content{background:#111;padding:10px 14px;border-radius:18px;max-width:70%}
        .input-area{padding:20px;border-top:1px solid #222}
        .input-wrapper{display:flex;gap:10px}
        input{flex:1;background:#111;border:1px solid #222;border-radius:28px;padding:12px 18px;color:#fff;font-size:14px;outline:none}
        button{background:#7c3eff;border:none;border-radius:28px;padding:0 20px;color:#fff;font-weight:600;cursor:pointer}
        .typing{display:flex;gap:4px;padding:10px}
        .dot{width:6px;height:6px;background:#7c3eff;border-radius:50%;animation:bounce 1s infinite}
        @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        .status{font-size:10px;color:#888;text-align:center;padding:5px}
    </style>
</head>
<body>
<div id="app"></div>

<script>
// ============================================
// 🔑 ТВОЙ КЛЮЧ (ВСТАВЛЕН ПРАВИЛЬНО, В КАВЫЧКАХ)
//    Срок действия: бессрочный
// ============================================
const OPENROUTER_KEY = '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';
// ============================================

let messages = [];
let requestCount = 0;

async function getAIResponse(message) {
    if (requestCount >= 20) {
        return "⏳ **Лимит 20 запросов в минуту.** Подожди немного.";
    }
    
    try {
        requestCount++;
        setTimeout(() => requestCount--, 60000);
        
        const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${OPENROUTER_KEY}`,
                'HTTP-Referer': window.location.origin,
                'X-Title': 'MindForge AI'
            },
            body: JSON.stringify({
                model: 'mistralai/mistral-7b-instruct:free',
                messages: [
                    { role: 'system', content: 'Ты MindForge AI. Отвечай кратко, по-русски, дружелюбно.' },
                    { role: 'user', content: message }
                ],
                max_tokens: 500,
                temperature: 0.8
            })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
            if (response.status === 401) {
                return "❌ **Ключ не работает!** Создай новый ключ на https://openrouter.ai/keys\n\nТвой текущий ключ: " + OPENROUTER_KEY.substring(0, 20) + "...";
            }
            if (response.status === 429) {
                return "⏳ **Лимит запросов OpenRouter.** Подожди 1 минуту.";
            }
            return `❌ Ошибка: ${data.error?.message || 'Неизвестная ошибка'}`;
        }
        
        return data.choices[0].message.content;
        
    } catch(e) {
        return "🌐 **Ошибка сети!** Проверь интернет.";
    }
}

function addMessage(text, isUser) {
    messages.push({ text, isUser });
    renderMessages();
}

async function sendMessage() {
    const input = document.getElementById('msgInput');
    const text = input.value.trim();
    if (!text) return;
    
    input.value = '';
    addMessage(text, true);
    
    // Индикатор
    const typingDiv = document.createElement('div');
    typingDiv.className = 'message ai';
    typingDiv.id = 'typing';
    typingDiv.innerHTML = '<div class="avatar">🤖</div><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
    document.getElementById('messages').appendChild(typingDiv);
    document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    
    const response = await getAIResponse(text);
    
    document.getElementById('typing')?.remove();
    addMessage(response, false);
}

function renderMessages() {
    const container = document.getElementById('messages');
    if (!container) return;
    
    container.innerHTML = messages.map(msg => `
        <div class="message ${msg.isUser ? 'user' : 'ai'}">
            <div class="avatar">${msg.isUser ? '👤' : '🤖'}</div>
            <div class="content">${msg.text.replace(/\n/g, '<br>')}</div>
        </div>
    `).join('');
    container.scrollTop = container.scrollHeight;
}

function renderMain() {
    document.getElementById('app').innerHTML = `
        <div class="container">
            <div class="header">
                <div class="logo">🧠 MindForge AI</div>
                <div class="status">🔑 Ключ: ${OPENROUTER_KEY.substring(0, 15)}... | ⏰ Срок: бессрочный | ⚡ 20 запросов/мин</div>
            </div>
            <div class="messages" id="messages"></div>
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="msgInput" placeholder="Спроси меня о чём угодно..." onkeypress="if(event.key==='Enter') sendMessage()">
                    <button onclick="sendMessage()">→</button>
                </div>
            </div>
        </div>
    `;
    renderMessages();
    document.getElementById('msgInput')?.focus();
}

// Загрузка сообщений
const saved = localStorage.getItem('mindforge_messages');
if (saved) messages = JSON.parse(saved);

renderMain();

window.onbeforeunload = () => {
    localStorage.setItem('mindforge_messages', JSON.stringify(messages));
};
</script>
</body>
</html>
